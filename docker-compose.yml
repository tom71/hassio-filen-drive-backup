version: "3.8"

# Local test environment for hassio-filen-drive-backup.
#
# Before starting:
#   1. Get your Filen API key:
#        python3 hassio-filen-drive-backup/dev/get_filen_api_key.py
#   2. Paste the key into:
#        hassio-filen-drive-backup/dev/data/local_docker_options.json
#
# Optional — HA Supervisor mock (provides fake backups / HA API):
#   Run in a second terminal from the workspace root:
#        cd hassio-filen-drive-backup && python3 -m dev.simulationserver
#   If you skip this, the add-on will show errors for HA-specific features
#   (backup creation, HA config) but Filen connectivity can still be verified.
#
# Start:
#   docker compose up --build
#
# Web UI:
#   http://localhost:1627

services:
  filen-backup:
    build:
      context: ./hassio-filen-drive-backup
      args:
        # Use the same base image as the HA Supervisor builder (Alpine + shell).
        # Switch to aarch64-base when testing on ARM.
        BUILD_FROM: ghcr.io/home-assistant/amd64-base:latest
    container_name: filen-backup-local
    # Use bridge networking so this also works from a devcontainer that talks to
    # a separate Docker daemon. The supervisor mock is reached via
    # host.docker.internal:56153 (see local_docker_options.json).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "1627:8099"
    volumes:
      # Persistent state between restarts
      - filen-backup-data:/data
      # Backup staging area (Docker volume for devcontainer compatibility)
      - filen-backup-backup:/backup
    environment:
      # Tells the add-on that a Supervisor token exists (used for URL selection)
      SUPERVISOR_TOKEN: "test_header"
    restart: unless-stopped

volumes:
  filen-backup-data:
    name: filen-backup-data
  filen-backup-backup:
    name: filen-backup-backup
